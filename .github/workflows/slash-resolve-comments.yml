name: Slash Auto-Resolve PR Comments

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  # One resolution job per PR at a time to avoid conflicting edits.
  group: ${{ github.repository }}-${{ github.event.issue.number || github.event.pull_request.number }}-slash-resolve-comments
  cancel-in-progress: false

jobs:
  resolve-comment:
    name: Resolve PR comment via Slash
    # Only run on PR comments (issue_comment fires on both issues and PRs).
    # Skip comments from bots (including Slash itself) to prevent feedback loops.
    if: |
      (
        github.event_name == 'pull_request_review_comment' ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null
        )
      ) &&
      github.actor != 'github-actions[bot]' &&
      github.actor != 'rzp-slash' &&
      github.actor != 'rzp-slash[bot]' &&
      github.actor != 'rzp-slash-public' &&
      github.actor != 'rzp-slash-public[bot]' &&
      github.actor != 'rzp-slash-reviewer' &&
      github.actor != 'rzp-slash-reviewer[bot]'
    runs-on: ubuntu-latest # nosemgrep: non-self-hosted-runner

    steps:
      - name: Resolve PR and comment metadata
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          # issue_comment fields
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_COMMENT_ID: ${{ github.event.comment.id }}
          ISSUE_COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          # pull_request_review_comment fields
          PR_NUMBER_FALLBACK: ${{ github.event.pull_request.number }}
          REVIEW_COMMENT_ID: ${{ github.event.comment.id }}
          REVIEW_COMMENT_BODY: ${{ github.event.comment.body }}
          REVIEW_COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          REVIEW_COMMENT_PATH: ${{ github.event.comment.path }}
          REVIEW_COMMENT_LINE: ${{ github.event.comment.line }}
          REVIEW_COMMENT_DIFF_HUNK: ${{ github.event.comment.diff_hunk }}
        run: |
          if [ "$EVENT_NAME" = "issue_comment" ]; then
            PR_NUMBER="$ISSUE_NUMBER"
            COMMENT_ID="$ISSUE_COMMENT_ID"
            COMMENT_BODY="$ISSUE_COMMENT_BODY"
            COMMENT_AUTHOR="$ISSUE_COMMENT_AUTHOR"
            COMMENT_TYPE="issue_comment"
            COMMENT_PATH=""
            COMMENT_LINE=""
            COMMENT_DIFF_HUNK=""
          else
            PR_NUMBER="$PR_NUMBER_FALLBACK"
            COMMENT_ID="$REVIEW_COMMENT_ID"
            COMMENT_BODY="$REVIEW_COMMENT_BODY"
            COMMENT_AUTHOR="$REVIEW_COMMENT_AUTHOR"
            COMMENT_TYPE="review_comment"
            COMMENT_PATH="$REVIEW_COMMENT_PATH"
            COMMENT_LINE="$REVIEW_COMMENT_LINE"
            COMMENT_DIFF_HUNK="$REVIEW_COMMENT_DIFF_HUNK"
          fi

          # Skip empty comments
          if [ -z "$PR_NUMBER" ] || [ -z "$COMMENT_BODY" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Fetch PR metadata
          PR_JSON=$(gh api "repos/$REPOSITORY/pulls/$PR_NUMBER" \
            --header "Accept: application/vnd.github+json")

          PR_URL=$(echo "$PR_JSON" | python3 -c "import sys,json; p=json.load(sys.stdin); print(p.get('html_url',''))")
          PR_TITLE=$(echo "$PR_JSON" | python3 -c "import sys,json; p=json.load(sys.stdin); print(p.get('title',''))")
          PR_AUTHOR=$(echo "$PR_JSON" | python3 -c "import sys,json; p=json.load(sys.stdin); print(p.get('user',{}).get('login',''))")
          PR_BRANCH=$(echo "$PR_JSON" | python3 -c "import sys,json; p=json.load(sys.stdin); print(p.get('head',{}).get('ref',''))")
          PR_TARGET_BRANCH=$(echo "$PR_JSON" | python3 -c "import sys,json; p=json.load(sys.stdin); print(p.get('base',{}).get('ref',''))")
          HEAD_SHA=$(echo "$PR_JSON" | python3 -c "import sys,json; p=json.load(sys.stdin); print(p.get('head',{}).get('sha',''))")

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
          echo "pr_author=$PR_AUTHOR" >> $GITHUB_OUTPUT
          echo "pr_branch=$PR_BRANCH" >> $GITHUB_OUTPUT
          echo "pr_target_branch=$PR_TARGET_BRANCH" >> $GITHUB_OUTPUT
          echo "head_sha=$HEAD_SHA" >> $GITHUB_OUTPUT
          echo "comment_id=$COMMENT_ID" >> $GITHUB_OUTPUT
          echo "comment_author=$COMMENT_AUTHOR" >> $GITHUB_OUTPUT
          echo "comment_type=$COMMENT_TYPE" >> $GITHUB_OUTPUT
          echo "comment_path=$COMMENT_PATH" >> $GITHUB_OUTPUT
          echo "comment_line=$COMMENT_LINE" >> $GITHUB_OUTPUT

          printf '%s' "$COMMENT_BODY" > /tmp/comment_body.txt
          printf '%s' "$COMMENT_DIFF_HUNK" > /tmp/diff_hunk.txt

      - name: Checkout repository
        if: steps.meta.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/scripts

      - name: Trigger Slash to resolve comment
        if: steps.meta.outputs.skip != 'true'
        env:
          SLASH_API_USERNAME: ${{ secrets.SLASH_API_USERNAME }}
          SLASH_API_PASSWORD: ${{ secrets.SLASH_API_PASSWORD }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          PR_URL: ${{ steps.meta.outputs.pr_url }}
          PR_TITLE: ${{ steps.meta.outputs.pr_title }}
          PR_BRANCH: ${{ steps.meta.outputs.pr_branch }}
          PR_REPOSITORY: ${{ github.repository }}
          COMMENT_ID: ${{ steps.meta.outputs.comment_id }}
          COMMENT_AUTHOR: ${{ steps.meta.outputs.comment_author }}
          COMMENT_TYPE: ${{ steps.meta.outputs.comment_type }}
          COMMENT_PATH: ${{ steps.meta.outputs.comment_path }}
          COMMENT_LINE: ${{ steps.meta.outputs.comment_line }}
        run: node .github/scripts/run-slash-comment.js
