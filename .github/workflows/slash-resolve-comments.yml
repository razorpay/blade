name: Agentic / Slash Auto-Resolve PR Comments

on:
  pull_request_review:
    types: [submitted]

concurrency:
  # One resolution job per PR at a time to avoid conflicting edits.
  group: ${{ github.repository }}-${{ github.event.pull_request.number }}-slash-resolve-comments
  cancel-in-progress: false

jobs:
  resolve-comments:
    name: Resolve PR review comments via Slash
    # Skip reviews from bots (including Slash itself) to prevent feedback loops.
    if: |
      github.actor != 'github-actions[bot]' &&
      github.actor != 'rzp-slash' &&
      github.actor != 'rzp-slash[bot]' &&
      github.actor != 'rzp-slash-public' &&
      github.actor != 'rzp-slash-public[bot]' &&
      github.actor != 'rzp-slash-reviewer' &&
      github.actor != 'rzp-slash-reviewer[bot]'
    runs-on: ubuntu-latest # nosemgrep: non-self-hosted-runner
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/scripts

      - name: Fetch review comments and trigger Slash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLASH_API_USERNAME: ${{ secrets.SLASH_API_USERNAME }}
          SLASH_API_PASSWORD: ${{ secrets.SLASH_API_PASSWORD }}
          SLASH_REPOSITORY_URL: https://github.com/${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEW_ID: ${{ github.event.review.id }}
        run: |
          COMMENT_URLS=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews/${REVIEW_ID}/comments" --jq '[.[] | select(.body | contains("@rzp-slash-public")) | .html_url] | join("\n")')

          if [ -z "$COMMENT_URLS" ]; then
            echo "No comments mentioning @rzp-slash-public in this review, skipping."
            exit 0
          fi

          PROMPT="Resolve the following PR review comments that were just submitted in a single review.

Comment URLs:
${COMMENT_URLS}

Instructions:
  - Fetch the details of the PR and each comment with \`gh\` CLI.
  - For each comment: when it asks for clarification, reply to the comment with a response (including \"resolved by agent\" at the end) OR push a code fix to the PR branch.
  - Whenever applicable, create a fix commit and push it to the PR branch, reply to the relevant comment(s) with \"resolved by agent\" at the end.
  - If you need clarification from the PR author for any comment, add the label \"Human Help Needed\" to the PR instead of guessing."

          node .github/scripts/run-slash.js "$PROMPT"
