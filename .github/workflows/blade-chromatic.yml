name: Blade Chromatic

on: push

env:
  GITHUB_ACCESS_TOKEN: ${{ secrets.CI_BOT_TOKEN }}

permissions:
  contents: read
  pull-requests: write

jobs:
  chromatic-deployment:
    name: Chromatic Deployment
    runs-on: ubuntu-latest # nosemgrep: non-self-hosted-runner
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Detect blade-svelte changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            svelte:
              - 'packages/blade-svelte/**'
              - 'packages/blade-core/**'
      - name: Use Node v20
        uses: actions/setup-node@v3
        with:
          node-version: 20.19.5
      - name: Setup Cache & Install Dependencies
        uses: ./.github/actions/install-dependencies
      - name: Install Dashboard Playground Dependencies
        working-directory: packages/blade/blade-dashboard-template
        run: yarn install
      - name: Build Dashboard Playground
        working-directory: packages/blade/blade-dashboard-template
        run: yarn run build
      - name: Copy Dashboard to Storybook Site
        working-directory: packages/blade
        run: |
          if [ -d "storybook-site/dashboard" ]; then
            rm -rf storybook-site/dashboard
          fi
          mkdir -p storybook-site/dashboard
          if [ -d "blade-dashboard-template/dist" ]; then
            cp -r blade-dashboard-template/dist/* storybook-site/dashboard/
            echo "✓ Dashboard build output copied to storybook-site/dashboard/"
          else
            echo "✗ Dashboard dist directory not found"
            exit 1
          fi
      - name: Build blade-core
        run: yarn build:blade-core
      - name: Build Svelte Storybook
        working-directory: packages/blade-svelte
        run: yarn build-storybook
      - name: Copy Svelte Storybook to Storybook Site
        working-directory: packages/blade
        run: |
          if [ -d "storybook-site/svelte" ]; then
            rm -rf storybook-site/svelte
          fi
          mkdir -p storybook-site/svelte
          if [ -d "../blade-svelte/storybook-static" ]; then
            cp -r ../blade-svelte/storybook-static/* storybook-site/svelte/
            echo "✓ Svelte Storybook copied to storybook-site/svelte/"
          else
            echo "✗ Svelte Storybook not found"
            exit 1
          fi
      - name: Publish to Chromatic
        id: chromatic
        uses: chromaui/action@v1
        with:
          token: ${{ env.GITHUB_ACCESS_TOKEN }}
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: packages/blade
          storybookBaseDir: packages/blade
          buildScriptName: react:storybook:build
          exitOnceUploaded: true
          onlyChanged: true
          untraced: '**/package.json'
          traceChanged: 'expanded'
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
      - name: Comment Svelte Storybook URL on PR
        if: steps.filter.outputs.svelte == 'true' && steps.chromatic.outputs.storybookUrl != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CI_BOT_TOKEN }}
          script: |
            const rawUrl = `${{ steps.chromatic.outputs.storybookUrl }}`;
            const base = rawUrl.replace(/\/$/, '').replace(/\/iframe\.html.*$/, '');
            const svelteUrl = `${base}/svelte/`;
            const marker = '<!-- svelte-storybook-comment -->';
            const body = `${marker}\n### Svelte Storybook\n\nView Svelte Storybook for this PR: ${svelteUrl}`;

            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            if (prs.length === 0) {
              core.info('No PR associated with this commit; skipping comment.');
              return;
            }
            const issue_number = prs[0].number;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
