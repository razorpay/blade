name: PMG Proxy Verification

on:
  workflow_dispatch:

jobs:
  malicious-package-blocked:
    runs-on: ubuntu-latest # nosemgrep: non-self-hosted-runner
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v3

      - name: Setup PMG proxy
        id: pmg-setup
        uses: safedep/pmg@v1
        with:
          server-mode: true
          api-key: ${{ secrets.PMG_PUBLIC_REPOS_TOKEN }}
          tenant-id: ${{ secrets.PMG_TENANT_ID }}

      - name: Use Node v22
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Attempt to install known-malicious test package
        id: malicious_install
        continue-on-error: true
        run: yarn add safedep-test-pkg@0.1.3 --no-lockfile

      - name: Verify malicious package was blocked
        run: |
          if [ "${{ steps.malicious_install.outcome }}" = "success" ]; then
            echo "PMG failed to block safedep-test-pkg@0.1.3"
            exit 1
          fi
          echo "PMG correctly blocked safedep-test-pkg@0.1.3"

      - name: Enforce PMG policy
        if: always()
        run: |
          if [ "${{ steps.pmg-setup.outcome }}" = "success" ]; then
            pmg proxy stop --fail-on-violation
          else
            pmg proxy stop || true
          fi

  clean-install-succeeds:
    runs-on: ubuntu-latest # nosemgrep: non-self-hosted-runner
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v3

      - name: Setup PMG proxy
        id: pmg-setup
        uses: safedep/pmg@v1
        with:
          server-mode: true
          api-key: ${{ secrets.PMG_PUBLIC_REPOS_TOKEN }}
          tenant-id: ${{ secrets.PMG_TENANT_ID }}

      - name: Use Node v22
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Setup Cache & Install Dependencies
        uses: ./.github/actions/install-dependencies

      - name: Enforce PMG policy
        if: always()
        run: |
          if [ "${{ steps.pmg-setup.outcome }}" = "success" ]; then
            pmg proxy stop --fail-on-violation
          else
            pmg proxy stop || true
          fi
