name: Slash UI Review

on:
  workflow_run:
    workflows: ['Blade Chromatic']
    types: [completed]
  pull_request:
    types: [labeled]

concurrency:
  group: ${{ github.repository }}-${{ github.event.pull_request.number || github.event.workflow_run.head_sha }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  slash-ui-review:
    name: Request Slash UI review
    # Trigger after Chromatic finishes (workflow_run), or on manual re-run via label.
    # Skip bot-authored PRs to prevent feedback loops.
    if: |
      github.actor != 'github-actions[bot]' &&
      (
        github.event_name == 'workflow_run' ||
        (
          github.event_name == 'pull_request' &&
          github.event.label.name == 'Run Slash UI Review'
        )
      )
    runs-on: ubuntu-latest # nosemgrep: non-self-hosted-runner

    steps:
      - name: Resolve PR metadata and Chromatic storybook URL
        id: pr-meta
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPOSITORY: ${{ github.repository }}
          PR_URL_FALLBACK: ${{ github.event.pull_request.html_url }}
          PR_NUMBER_FALLBACK: ${{ github.event.pull_request.number }}
          PR_AUTHOR_FALLBACK: ${{ github.event.pull_request.user.login }}
          PR_TITLE_FALLBACK: ${{ github.event.pull_request.title }}
          PR_BRANCH_FALLBACK: ${{ github.head_ref }}
          PR_TARGET_BRANCH_FALLBACK: ${{ github.base_ref }}
          MASTER_STORYBOOK_URL: "https://blade.razorpay.com/"
        run: |
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            PR_JSON=$(gh api "repos/$REPOSITORY/commits/$HEAD_SHA/pulls" \
              --header "Accept: application/vnd.github+json")
            PR_URL=$(echo "$PR_JSON" | python3 -c "import sys,json; p=json.load(sys.stdin); print(p[0]['html_url'] if p else '')")
            PR_NUMBER=$(echo "$PR_JSON" | python3 -c "import sys,json; p=json.load(sys.stdin); print(p[0]['number'] if p else '')")
            PR_AUTHOR=$(echo "$PR_JSON" | python3 -c "import sys,json; p=json.load(sys.stdin); print(p[0]['user']['login'] if p else '')")
            PR_TITLE=$(echo "$PR_JSON" | python3 -c "import sys,json; p=json.load(sys.stdin); print(p[0]['title'] if p else '')")
            PR_BRANCH=$(echo "$PR_JSON" | python3 -c "import sys,json; p=json.load(sys.stdin); print(p[0]['head']['ref'] if p else '')")
            PR_TARGET_BRANCH=$(echo "$PR_JSON" | python3 -c "import sys,json; p=json.load(sys.stdin); print(p[0]['base']['ref'] if p else '')")
          else
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            PR_URL="$PR_URL_FALLBACK"
            PR_NUMBER="$PR_NUMBER_FALLBACK"
            PR_AUTHOR="$PR_AUTHOR_FALLBACK"
            PR_TITLE="$PR_TITLE_FALLBACK"
            PR_BRANCH="$PR_BRANCH_FALLBACK"
            PR_TARGET_BRANCH="$PR_TARGET_BRANCH_FALLBACK"
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found for this commit — skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Find the Chromatic check run and extract the published storybook URL.
          CHROMATIC_CHECK=$(gh api "repos/$REPOSITORY/commits/$HEAD_SHA/check-runs" \
            --header "Accept: application/vnd.github+json" \
            --paginate \
            -q '.check_runs[] | select((.name | ascii_downcase | contains("chromatic")) or (.app.slug // "" | contains("chromatic")))')

          STORYBOOK_URL=$(echo "$CHROMATIC_CHECK" | python3 -c "
          import sys, json, re

          data = sys.stdin.read().strip()
          if not data:
              print('')
              sys.exit(0)

          try:
              check = json.loads(data)
          except Exception:
              try:
                  check = json.loads(data.split('\n')[0])
              except Exception:
                  print('')
                  sys.exit(0)

          output = check.get('output', {})
          text = (output.get('text', '') or '') + ' ' + (output.get('summary', '') or '')

          match = re.search(r'https://[a-z0-9\-]+--[a-z0-9]+\.chromatic\.com[^\s\"<>]*', text)
          if match:
              print(match.group(0).rstrip('/') + '/')
          else:
              print(check.get('details_url', ''))
          " 2>/dev/null || echo "")

          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_author=$PR_AUTHOR" >> $GITHUB_OUTPUT
          echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
          echo "pr_branch=$PR_BRANCH" >> $GITHUB_OUTPUT
          echo "pr_target_branch=$PR_TARGET_BRANCH" >> $GITHUB_OUTPUT
          echo "head_sha=$HEAD_SHA" >> $GITHUB_OUTPUT
          echo "storybook_url=$STORYBOOK_URL" >> $GITHUB_OUTPUT
          echo "master_storybook_url=$MASTER_STORYBOOK_URL" >> $GITHUB_OUTPUT

      - name: Trigger Slash UI review via tasks API
        if: steps.pr-meta.outputs.skip != 'true'
        env:
          SLASH_AUTH_TOKEN: ${{ secrets.SLASH_AUTH_TOKEN }}
          PR_URL: ${{ steps.pr-meta.outputs.pr_url }}
          PR_NUMBER: ${{ steps.pr-meta.outputs.pr_number }}
          PR_TITLE: ${{ steps.pr-meta.outputs.pr_title }}
          PR_BRANCH: ${{ steps.pr-meta.outputs.pr_branch }}
          PR_REPOSITORY: ${{ github.repository }}
          STORYBOOK_URL: ${{ steps.pr-meta.outputs.storybook_url }}
          MASTER_STORYBOOK_URL: ${{ steps.pr-meta.outputs.master_storybook_url }}
        run: |
          SLASH_API="https://slash-api.concierge.razorpay.com/api/v1/agents/run"

          PAYLOAD=$(python3 -c "
          import json, os

          pr_number = os.environ['PR_NUMBER']
          pr_url = os.environ['PR_URL']
          pr_title = os.environ['PR_TITLE']
          pr_branch = os.environ['PR_BRANCH']
          repository = os.environ['PR_REPOSITORY']
          storybook_url = os.environ['STORYBOOK_URL']
          master_storybook_url = os.environ['MASTER_STORYBOOK_URL']

          prompt = (
            f'Use the verify-with-browser skill to do a UI review for PR #{pr_number} in {repository}.\n\n'
            f'PR: {pr_url}\n'
            f'Title: {pr_title}\n'
            f'Branch: {pr_branch}\n\n'
            f'PR Storybook URL (Chromatic): {storybook_url}\n'
            f'Master Storybook URL: {master_storybook_url}\n\n'
            f'Steps:\n'
            f'1. Look at the PR diff to identify which components/stories changed.\n'
            f'2. Open the PR storybook and find the stories for those components.\n'
            f'3. Compare those stories against the same stories in the master storybook ({master_storybook_url}).\n'
            f'4. Post a comment on PR #{pr_number} summarising which flows were tested and their visual status (pass/fail/needs-review).'
          )

          print(json.dumps({
            'prompt': prompt,
            'repository_url': f'https://github.com/{repository}',
            'branch': pr_branch,
            'skills': ['verify-with-browser'],
          }))
          ")

          echo "Triggering Slash UI review for PR #${PR_NUMBER} (${PR_URL})"

          HTTP_STATUS=$(curl --silent --output "/tmp/slash_response.json" \
            --write-out "%{http_code}" \
            --request POST "${SLASH_API}" \
            --header "Authorization: Bearer ${SLASH_AUTH_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "${PAYLOAD}")

          RESPONSE=$(cat /tmp/slash_response.json)
          echo "HTTP status: ${HTTP_STATUS}"
          echo "${RESPONSE}"

          if [ "${HTTP_STATUS}" = "201" ] || [ "${HTTP_STATUS}" = "200" ] || [ "${HTTP_STATUS}" = "202" ]; then
            TASK_ID=$(echo "${RESPONSE}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('task_id', d.get('id','')))" 2>/dev/null || true)
            echo "UI review task created — task_id: ${TASK_ID}"
          else
            echo "Slash UI review request failed with HTTP ${HTTP_STATUS}"
            exit 1
          fi
