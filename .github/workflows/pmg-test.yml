name: PMG Proxy Test

on:
  push:

jobs:
  test-pmg-allows-clean-install:
    name: PMG - Clean package should not be blocked
    runs-on: ubuntu-latest # nosemgrep: non-self-hosted-runner
    env:
      HAS_PMG_API_KEY: ${{ secrets.PMG_PUBLIC_REPOS_TOKEN != '' }}
      HAS_PMG_TENANT_ID: ${{ secrets.PMG_TENANT_ID != '' }}
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v3

      - name: Setup PMG proxy
        if: ${{ env.HAS_PMG_API_KEY == 'true' && env.HAS_PMG_TENANT_ID == 'true' }}
        uses: safedep/pmg@v1
        with:
          server-mode: true
          api-key: ${{ secrets.PMG_PUBLIC_REPOS_TOKEN }}
          tenant-id: ${{ secrets.PMG_TENANT_ID }}

      - name: Setup PMG proxy without cloud credentials
        if: ${{ env.HAS_PMG_API_KEY != 'true' || env.HAS_PMG_TENANT_ID != 'true' }}
        uses: safedep/pmg@v1
        with:
          server-mode: true

      - name: Use Node v22
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install clean package (should succeed)
        uses: ./.github/actions/install-dependencies

      - name: Enforce PMG policy
        if: always()
        run: pmg proxy stop --fail-on-violation

  test-pmg-blocks-malicious-package:
    name: PMG - Malicious package should be blocked
    runs-on: ubuntu-latest # nosemgrep: non-self-hosted-runner
    env:
      HAS_PMG_API_KEY: ${{ secrets.PMG_PUBLIC_REPOS_TOKEN != '' }}
      HAS_PMG_TENANT_ID: ${{ secrets.PMG_TENANT_ID != '' }}
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v3

      - name: Setup PMG proxy
        if: ${{ env.HAS_PMG_API_KEY == 'true' && env.HAS_PMG_TENANT_ID == 'true' }}
        uses: safedep/pmg@v1
        with:
          server-mode: true
          api-key: ${{ secrets.PMG_PUBLIC_REPOS_TOKEN }}
          tenant-id: ${{ secrets.PMG_TENANT_ID }}

      - name: Setup PMG proxy without cloud credentials
        if: ${{ env.HAS_PMG_API_KEY != 'true' || env.HAS_PMG_TENANT_ID != 'true' }}
        uses: safedep/pmg@v1
        with:
          server-mode: true

      - name: Use Node v22
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install flagged test package (PMG should block this)
        continue-on-error: true
        run: yarn add safedep-test-pkg@0.1.3 --no-lockfile

      - name: Assert PMG recorded a violation
        if: always()
        run: |
          if pmg proxy stop --fail-on-violation; then
            echo "::error::PMG recorded no violation — the flagged package was NOT blocked."
            exit 1
          fi
          echo "PMG blocked the flagged package as expected."
