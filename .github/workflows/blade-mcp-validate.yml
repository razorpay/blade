name: Blade MCP Validate

on:
  pull_request:
    paths:
      - 'packages/blade-mcp/**'
      - '.github/workflows/blade-mcp-validate.yml'

permissions:
  checks: write
  pull-requests: write
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest # nosemgrep: non-self-hosted-runner
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v3
      - name: Setup PMG proxy
        id: pmg-setup
        uses: safedep/pmg@5ac0f275b83d9d5a9342c6aae977ec32fa330daa
        with:
          server-mode: true
          api-key: ${{ secrets.PMG_PUBLIC_REPOS_TOKEN }}
          tenant-id: ${{ secrets.PMG_TENANT_ID }}
          timeout-minutes: 5
      - name: Use Node v22
        uses: actions/setup-node@v3
        with:
          node-version: 22
      - name: Setup Cache & Install Dependencies
        uses: ./.github/actions/install-dependencies
      - name: Run Unit Tests
        run: yarn test
        working-directory: packages/blade-mcp
      - name: Enforce PMG policy
        if: always()
        run: |
          if [ "${{ steps.pmg-setup.outcome }}" = "success" ]; then
            pmg proxy stop --fail-on-violation
          else
            pmg proxy stop || true
          fi
        timeout-minutes: 2

