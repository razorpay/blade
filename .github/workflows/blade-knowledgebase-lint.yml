name: Knowledgebase Lint

on: [pull_request]

permissions:
  checks: write
  pull-requests: write
  contents: read

env:
  GITHUB_ACCESS_TOKEN: ${{ secrets.CI_BOT_TOKEN }}

jobs:
  validate:
    name: Knowledgebase Lint
    runs-on: ubuntu-latest # nosemgrep: non-self-hosted-runner
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v3
      - name: Setup PMG proxy
        uses: safedep/pmg@v1
        with:
          server-mode: true
          api-key: ${{ secrets.PMG_PUBLIC_REPOS_TOKEN }}
          tenant-id: ${{ secrets.PMG_TENANT_ID }}
      - name: Use Node v22
        uses: actions/setup-node@v3
        with:
          node-version: 22
      - name: Setup Cache & Install Dependencies
        uses: ./.github/actions/install-dependencies
      - name: Build Blade
        run: yarn build
        working-directory: packages/blade
      - name: Run Lint Script
        run: yarn tsc:knowledgebase
      - name: Enforce PMG policy
        if: always()
        run: pmg proxy stop --fail-on-violation
